<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investment Portfolio | MERR Surabaya</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --primary:#00F5FF;
    --secondary:#7C4DFF;
    --dark:#07111F;
    --dark2:#0E1B2F;
    --glass:rgba(255,255,255,0.08);
    --white:#ffffff;
    --soft:#C8D2E0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:linear-gradient(135deg,#06101d,#0b1830,#101f3d);
    color:white;
    overflow:hidden;
}

/* MAIN */
.container{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
    padding:40px;
}

/* SLIDE */
.slide{
    display:none;
    width:90%;
    max-width:1200px;
    height:85vh;
    border-radius:28px;
    overflow:hidden;
    position:relative;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(22px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
        0 20px 60px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.03);
}

.slide.active{
    display:block;
    animation:fadeUp .7s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* HERO */
.hero-image{
    width:100%;
    height:38%;
    background-size:cover;
    background-position:center;
    position:relative;
}

.hero-image::after{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,.2), rgba(7,17,31,.95));
}

.content{
    padding:40px 50px;
    position:relative;
    z-index:2;
}

.tag{
    display:inline-block;
    padding:8px 18px;
    border-radius:999px;
    background:rgba(0,245,255,.12);
    border:1px solid rgba(0,245,255,.3);
    color:var(--primary);
    font-size:14px;
    margin-bottom:20px;
    font-weight:600;
}

h1,h2{
    font-size:42px;
    margin-bottom:20px;
    line-height:1.1;
    letter-spacing:-1px;
}

h2{
    font-size:34px;
}

p{
    color:var(--soft);
    font-size:18px;
    line-height:1.8;
    margin-bottom:20px;
}

/* PDF GRID */
.doc-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:22px;
    margin-top:30px;
}

.doc-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:.35s;
}

.doc-card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 40px rgba(0,245,255,.08);
}

.doc-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.doc-info{
    padding:18px;
}

.doc-info h3{
    font-size:16px;
    margin-bottom:8px;
}

.doc-info span{
    font-size:14px;
    color:var(--primary);
}

/* CONTACT */
.contact-box{
    margin-top:30px;
    padding:30px;
    border-radius:24px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
}

.contact-box p{
    margin-bottom:10px;
    font-size:18px;
}

/* NAV */
.nav{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:20px;
    z-index:10;
}

button{
    border:none;
    background:transparent;
    color:var(--primary);
    border:1px solid rgba(0,245,255,.4);
    padding:14px 30px;
    border-radius:999px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

button:hover{
    background:var(--primary);
    color:#001018;
}

/* LIGHTBOX */
#lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.9);
    z-index:999;
    justify-content:center;
    align-items:center;
}

#lightbox iframe{
    width:90%;
    height:90%;
    border:none;
    border-radius:20px;
    background:white;
}
</style>
</head>
<body>

<div class="container" id="app"></div>

<div id="lightbox" onclick="closePDF()">
    <iframe id="pdfViewer"></iframe>
</div>

<script>

const slidesData = [

{
    type:"intro",
    title:"Investment Portfolio",
    subtitle:"Lahan Strategis MERR Surabaya",
    desc:"Selamat datang dalam presentasi investasi premium untuk aset lahan strategis di kawasan MERR Surabaya Timur. Dokumen ini disusun untuk memberikan gambaran menyeluruh mengenai kekuatan hukum, potensi bisnis, perlindungan aset, serta peluang kerja sama strategis yang bernilai tinggi.",
    hero:"img/tanah-utama.jpg"
},

{
    title:"Executive Summary",
    desc:"Aset ini bukan sekadar tanah kosong, melainkan sebuah Legal Audit File yang lengkap. Seluruh rantai bukti telah tersusun mulai dari putusan pengadilan, proses eksekusi resmi, perlindungan institusional negara, validitas transaksi notariil, hingga finalisasi administrasi BPN. Inilah yang menjadikan aset ini sangat layak untuk investor besar.",
    docs:[
        {
            title:"Preview Dokumen Utama",
            preview:"preview/putusan-preview.jpg",
            pdf:"pdf/putusan-pn.pdf"
        }
    ]
},

{
    title:"Fondasi Hukum (Inkracht)",
    desc:"Putusan PN Surabaya Nomor 728/Pdt.G/2018 menjadi fondasi utama dari seluruh aset ini. Status Inkracht berarti perkara telah berkekuatan hukum tetap, final, dan tidak lagi dapat diganggu gugat secara efektif. Ini adalah bentuk kepastian hukum tertinggi yang dicari investor properti besar.",
    docs:[
        {
            title:"Putusan PN Surabaya",
            preview:"preview/putusan-preview.jpg",
            pdf:"pdf/putusan-pn.pdf"
        }
    ]
},

{
    title:"Tahap Eksekusi (Amaning)",
    desc:"Penetapan Amaning Nomor 43.EKS.2019 menunjukkan bahwa proses tidak berhenti di atas kertas. Pengadilan telah mengeluarkan teguran resmi untuk pengosongan lahan, artinya proses penguasaan fisik sedang berjalan secara nyata. Investor tidak membeli sengketa, tetapi membeli kepastian realisasi aset.",
    docs:[
        {
            title:"Dokumen Amaning",
            preview:"preview/amaning-preview.jpg",
            pdf:"pdf/amaning.pdf"
        }
    ]
},

{
    title:"Proteksi dan Pengawasan Negara",
    desc:"Dukungan dari Mahkamah Agung serta Bareskrim Polri Tipidum menjadi lapisan perlindungan yang sangat kuat. Risiko gangguan pihak luar, mafia tanah, maupun hambatan fisik di lapangan dapat diminimalkan secara maksimal karena proyek ini berada dalam pengawasan institusi negara tingkat tinggi.",
    docs:[
        {
            title:"Dukungan Polri & MA",
            preview:"preview/polri-preview.jpg",
            pdf:"pdf/dukungan-polri.pdf"
        }
    ]
},

{
    title:"Validitas Transaksi dan Legal Standing",
    desc:"Ikatan Jual Beli resmi melalui notaris membuktikan bahwa hubungan hukum atas aset ini sah, profesional, dan transparan. Ini memperkuat posisi hukum pemilik sekaligus mempermudah proses due diligence bagi calon investor strategis maupun mitra joint venture.",
    docs:[
        {
            title:"IJB Notaris",
            preview:"preview/ijb-preview.jpg",
            pdf:"pdf/ijb.pdf"
        }
    ]
},

{
    title:"Finalisasi Administrasi BPN",
    desc:"Saat ini proses validasi batas lahan dan administrasi sertifikasi di BPN sedang berjalan. Ini menunjukkan bahwa aset tidak hanya kuat secara hukum, tetapi juga sedang ditingkatkan menuju validitas administratif penuh. Nilai komersial aset otomatis meningkat signifikan.",
    docs:[
        {
            title:"Dokumen BPN",
            preview:"preview/bpn-preview.jpg",
            pdf:"pdf/bpn.pdf"
        }
    ]
},

{
    title:"Contact Person",
    contact:true,
    desc:"Untuk pembahasan lebih lanjut, verifikasi dokumen asli, peninjauan lapangan, maupun diskusi kerja sama strategis, silakan menghubungi contact person berikut."
}

];

let current = 0;
const app = document.getElementById("app");

function render(){

    app.innerHTML = slidesData.map((slide,index)=>{

        if(slide.type === "intro"){
            return `
            <div class="slide ${index===current ? 'active':''}">
                <div class="hero-image" style="background-image:url('${slide.hero}')"></div>
                <div class="content">
                    <div class="tag">PREMIUM INVESTOR DECK</div>
                    <h1>${slide.title}</h1>
                    <h2>${slide.subtitle}</h2>
                    <p>${slide.desc}</p>
                </div>
            </div>
            `;
        }

        if(slide.contact){
            return `
            <div class="slide ${index===current ? 'active':''}">
                <div class="content" style="padding-top:80px;">
                    <div class="tag">FINAL STEP</div>
                    <h2>${slide.title}</h2>
                    <p>${slide.desc}</p>

                    <div class="contact-box">
                        <p><strong>Nama:</strong> Ahmad Farel</p>
                        <p><strong>WhatsApp:</strong> +62 xxx xxxx xxxx</p>
                        <p><strong>Email:</strong> yourmail@email.com</p>
                        <p><strong>Lokasi:</strong> Surabaya, Jawa Timur</p>
                        <p><strong>Keterangan:</strong> Serious Investor Only</p>
                    </div>
                </div>
            </div>
            `;
        }

        return `
        <div class="slide ${index===current ? 'active':''}">
            <div class="content" style="padding-top:70px;">
                <div class="tag">LEGAL AUDIT FILE</div>
                <h2>${slide.title}</h2>
                <p>${slide.desc}</p>

                <div class="doc-grid">
                    ${slide.docs.map(doc=>`
                        <div class="doc-card" onclick="openPDF('${doc.pdf}')">
                            <img src="${doc.preview}">
                            <div class="doc-info">
                                <h3>${doc.title}</h3>
                                <span>Klik untuk membuka PDF</span>
                            </div>
                        </div>
                    `).join("")}
                </div>
            </div>
        </div>
        `;
    }).join("") + `

    <div class="nav">
        <button onclick="prev()">SEBELUMNYA</button>
        <button onclick="next()">SELANJUTNYA</button>
    </div>
    `;
}

function next(){
    if(current < slidesData.length - 1){
        current++;
        render();
    }
}

function prev(){
    if(current > 0){
        current--;
        render();
    }
}

function openPDF(pdfPath){
    document.getElementById("pdfViewer").src = pdfPath;
    document.getElementById("lightbox").style.display = "flex";
}

function closePDF(){
    document.getElementById("lightbox").style.display = "none";
    document.getElementById("pdfViewer").src = "";
}

render();

</script>
</body>
</html>
