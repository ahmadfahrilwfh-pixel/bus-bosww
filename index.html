<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransNexus - Masa Depan Armada Bis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-border:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }
        .bg-animate {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #020617);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .hidden-form { display: none; }
    </style>
</head>
<body class="bg-animate min-h-screen flex items-center justify-center p-6">

    <div class="glass w-full max-w-md rounded-[2.5rem] p-8 md:p-10 shadow-2xl relative overflow-hidden transition-all duration-500">
        
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-cyan-500/20 rounded-full blur-[80px]"></div>
        <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-blue-600/20 rounded-full blur-[80px]"></div>

        <div class="text-center mb-8 relative z-10">
            <div class="inline-block p-3 bg-cyan-500/10 rounded-2xl mb-4 border border-cyan-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-cyan-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17h10"/><path d="M8 21h8"/><path d="M2 13h20"/><path d="M18 13v-3a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v3"/><path d="M12 7V3"/><path d="m8 3 4 4 4-4"/></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight" id="auth-title">TransNexus</h1>
            <p class="text-gray-400 mt-2 text-sm" id="auth-subtitle">Sistem Manajemen Bis Masa Depan</p>
        </div>

        <form id="login-form" class="space-y-5 relative z-10" onsubmit="event.preventDefault()">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Email Bis</label>
                <input type="email" placeholder="admin@po-bis.id" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white outline-none neon-border transition-all">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Kata Sandi</label>
                <input type="password" placeholder="••••••••" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white outline-none neon-border transition-all">
            </div>
            <button class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold py-4 rounded-2xl shadow-lg shadow-cyan-500/20 transition-all transform active:scale-95">
                Masuk ke Dashboard
            </button>
        </form>

        <form id="register-form" class="hidden-form space-y-5 relative z-10" onsubmit="event.preventDefault()">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Nama PO</label>
                    <input type="text" placeholder="PO. Maju" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white outline-none neon-border transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Kota</label>
                    <input type="text" placeholder="Solo" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white outline-none neon-border transition-all">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Email Bis</label>
                <input type="email" placeholder="owner@bis.id" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white outline-none neon-border transition-all">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-widest mb-2">Pilih Plan</label>
                <select class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3.5 text-white outline-none neon-border transition-all appearance-none">
                    <option class="bg-slate-900">Standard (10 Armada)</option>
                    <option class="bg-slate-900">Enterprise (Unlimited)</option>
                </select>
            </div>
            <button class="w-full bg-white text-slate-950 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all transform active:scale-95">
                Daftarkan Armada
            </button>
        </form>

        <div class="mt-8 text-center relative z-10">
            <p class="text-gray-400 text-sm">
                <span id="switch-text">Belum punya akses sistem?</span>
                <button onclick="toggleAuth()" class="text-cyan-400 font-semibold hover:text-cyan-300 transition" id="switch-btn">Daftar Sekarang</button>
            </p>
        </div>

    </div>

    <script>
        function toggleAuth() {
            const loginForm = document.getElementById('login-form');
            const regForm = document.getElementById('register-form');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const switchBtn = document.getElementById('switch-btn');
            const switchText = document.getElementById('switch-text');

            if (loginForm.classList.contains('hidden-form')) {
                loginForm.classList.remove('hidden-form');
                regForm.classList.add('hidden-form');
                title.innerText = "TransNexus";
                subtitle.innerText = "Sistem Manajemen Bis Masa Depan";
                switchText.innerText = "Belum punya akses sistem? ";
                switchBtn.innerText = "Daftar Sekarang";
            } else {
                loginForm.classList.add('hidden-form');
                regForm.classList.remove('hidden-form');
                title.innerText = "Registrasi Mitra";
                subtitle.innerText = "Bergabung dengan Ekosistem Digital Kami";
                switchText.innerText = "Sudah terdaftar? ";
                switchBtn.innerText = "Silahkan Masuk";
            }
        }
    </script>
</body>
</html>
