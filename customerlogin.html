<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransNexus - Masa Depan Perjalanan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            overflow: hidden;
        }

        /* Background Animasi Biru-Merah */
        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(30, 64, 175, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(220, 38, 38, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 58, 138, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(185, 28, 28, 0.3) 0px, transparent 50%);
            animation: mesh 15s ease infinite;
        }

        @keyframes mesh {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
        }

        .glass-premium {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .neon-blue {
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
            border: 1px solid rgba(34, 211, 238, 0.5);
        }

        .btn-gradient {
            background: linear-gradient(90deg, #1e40af, #dc2626);
            transition: all 0.3s ease;
        }

        .btn-gradient:hover {
            background: linear-gradient(90deg, #2563eb, #ef4444);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
            transform: translateY(-2px);
        }

        .tab-active {
            color: #22d3ee;
            border-bottom: 3px solid #22d3ee;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-mesh"></div>

    <div class="glass-premium w-full max-w-[420px] rounded-[2.5rem] overflow-hidden relative">
        
        <div class="absolute top-0 right-0 w-32 h-32 bg-red-600/20 rounded-full blur-3xl"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-blue-600/20 rounded-full blur-3xl"></div>

        <div class="relative h-44 flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-tr from-blue-900/80 to-red-900/80 z-10"></div>
            <img src="https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=600" class="absolute w-full h-full object-cover scale-110 blur-[1px]" alt="Bus">
            
            <div class="relative z-20 text-center px-6">
                <div class="bg-white/10 w-16 h-16 rounded-2xl backdrop-blur-md border border-white/20 flex items-center justify-center mx-auto mb-3 shadow-2xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                    </svg>
                </div>
                <h2 class="text-2xl font-black text-white tracking-tighter uppercase">TransNexus <span class="text-red-500">Go</span></h2>
            </div>
        </div>

        <div class="p-8 pt-6">
            <div class="flex gap-8 mb-8 text-sm font-black uppercase tracking-widest border-b border-white/5">
                <button class="pb-3 tab-active transition-all">Masuk</button>
                <button class="pb-3 text-gray-500 hover:text-gray-300 transition-all">Daftar</button>
            </div>

            <button class="w-full bg-white/5 border border-white/10 text-white py-4 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-white/10 transition mb-6 group">
                <div class="bg-white p-1 rounded-full group-hover:scale-110 transition">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-4 h-4">
                </div>
                Lanjutkan dengan Google
            </button>

            <div class="relative mb-6 text-center">
                <span class="bg-[#0f172a] px-4 text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] relative z-10">Atau Akses Cepat</span>
                <div class="absolute top-1/2 w-full border-t border-white/5"></div>
            </div>

            <div class="space-y-5">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest ml-2">Nomor WhatsApp</label>
                    <div class="relative group">
                        <input type="text" placeholder="08xx xxxx xxxx" 
                            class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-white outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400/30 transition-all">
                        <div class="absolute right-5 top-4 text-cyan-500/50 group-focus-within:text-cyan-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                            </svg>
                        </div>
                    </div>
                </div>
                
                <button onclick="window.location.href='dashboard.html'" 
                    class="w-full btn-gradient text-white font-black py-4 rounded-2xl shadow-xl uppercase tracking-widest text-sm active:scale-95">
                    Mulai Perjalanan
                </button>
            </div>

            <div class="mt-8">
                <p class="text-[10px] text-gray-500 text-center leading-relaxed">
                    Sistem terenkripsi secara otomatis oleh <span class="text-white">TransNexus Secure</span>
                </p>
                
                <div class="mt-6 flex flex-col items-center gap-4">
                    <a href="index.html" class="group flex items-center gap-2 text-[11px] font-bold text-gray-400 hover:text-red-500 transition-all uppercase tracking-widest">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transform group-hover:-translate-x-1 transition" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 9 9 0 01-18 0z" />
                        </svg>
                        Portal Pemilik Armada
                    </a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
